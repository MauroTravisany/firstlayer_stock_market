name: Deploy Evidence dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "dashboard/**"
      - ".github/workflows/deploy-dashboard.yml"
  schedule:
    - cron: "10 1 * * 2-6"

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: dashboard
        run: npm install --legacy-peer-deps

      - name: Export BigQuery snapshots
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dashboard/data

          bq query --project_id="${{ secrets.GCP_PROJECT_ID }}" --use_legacy_sql=false --format=csv \
            'select * from `stocks-437902.acciones_dataset.looker_portfolio_latest`' \
            > dashboard/data/portfolio_latest.csv

          bq query --project_id="${{ secrets.GCP_PROJECT_ID }}" --use_legacy_sql=false --format=csv \
            'select * from `stocks-437902.acciones_dataset.looker_portfolio_history`' \
            > dashboard/data/portfolio_history.csv

          if ! bq query --project_id="${{ secrets.GCP_PROJECT_ID }}" --use_legacy_sql=false --format=csv \
            'select * from `stocks-437902.acciones_dataset.portfolio_signal_backtest`' \
            > dashboard/data/portfolio_signal_backtest.csv; then
            printf 'analysis_date,ticker,signal,sell_signal,classification,last_close,final_score,sell_score,margin_of_safety_pct,risk_level,technical_trend,price_5d,price_20d,price_60d,forward_return_5d,forward_return_20d,forward_return_60d,signal_success_60d,backtest_status,calculated_at\n' > dashboard/data/portfolio_signal_backtest.csv
          fi

          bq query --project_id="${{ secrets.GCP_PROJECT_ID }}" --use_legacy_sql=false --format=csv \
            'select * from `stocks-437902.acciones_dataset.looker_portfolio_summary`' \
            > dashboard/data/portfolio_summary.csv

          bq query --project_id="${{ secrets.GCP_PROJECT_ID }}" --use_legacy_sql=false --format=csv \
            'select * from `stocks-437902.acciones_dataset.looker_portfolio_ai_summary`' \
            > dashboard/data/portfolio_ai_summary.csv

          bq query --project_id="${{ secrets.GCP_PROJECT_ID }}" --use_legacy_sql=false --format=csv \
            'select * from `stocks-437902.acciones_dataset.looker_data_quality_latest`' \
            > dashboard/data/data_quality_latest.csv

          bq query --project_id="${{ secrets.GCP_PROJECT_ID }}" --use_legacy_sql=false --format=csv \
            'select * from `stocks-437902.acciones_dataset.portfolio_ai_analysis_daily`
             where analysis_date = (
               select max(analysis_date)
               from `stocks-437902.acciones_dataset.portfolio_ai_analysis_daily`
             )' \
            > dashboard/data/ai_analysis_latest.csv

          for csv_file in dashboard/data/*.csv; do
            echo "::group::$(basename "$csv_file")"
            head -n 1 "$csv_file"
            rows=$(( $(wc -l < "$csv_file") - 1 ))
            echo "rows=$rows"
            if [ "$rows" -le 0 ]; then
              if [ "$(basename "$csv_file")" = "portfolio_signal_backtest.csv" ]; then
                echo "CSV snapshot is empty but allowed until historical forward returns exist: $csv_file"
                echo "::endgroup::"
                continue
              fi
              echo "CSV snapshot is empty: $csv_file" >&2
              exit 1
            fi
            echo "::endgroup::"
          done

      - name: Build Evidence sources
        working-directory: dashboard
        run: npm run sources:strict

      - name: Build static dashboard
        working-directory: dashboard
        run: npm run build:strict

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
