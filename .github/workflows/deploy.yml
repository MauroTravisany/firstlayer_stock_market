name: Deploy Cloud Run service

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy stock prices to Cloud Run
        run: |
          gcloud run deploy stockdaily \
              --source ./cloud-functions/daily_stocks \
              --platform managed \
              --region us-east1 \
              --allow-unauthenticated \
              --clear-base-image \
              --command="" \
              --args="" \
              --set-env-vars "TICKERS=AAPL;GOOGL,PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}"

      - name: Deploy financial data to Cloud Run
        run: |
          gcloud run deploy stockfinancial \
              --source ./cloud-functions/financial_data \
              --platform managed \
              --region us-east1 \
              --allow-unauthenticated \
              --clear-base-image \
              --command="" \
              --args="" \
              --set-env-vars "TICKERS=AAPL;AMZN;ASML;BBH;BCH;COIN;DGRO;GOOG;GOOGL;INTC;KO;MCD;MELI;META;MSFT;MSTR;NFLX;NKE;NVDA;PFE;SBUX;TSLA;TTWO;URA;XLE;GRID,PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},FINANCIAL_STATEMENTS_TABLE_ID=financial_statements,FINANCIAL_RATIOS_TABLE_ID=financial_ratios_snapshot"
